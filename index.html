<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Mario Bros - Enhanced</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<body>
<div id="wrap">
<div id="hud">
<span><label>MARIO</label><b id="hScore">000000</b></span>

<div class="btn-group">
<button class="ctrl-btn" id="btn-dash" style="font-size:13px">&#128168;</button>
<button class="ctrl-btn" id="btn-fire" style="font-size:18px">&#128293;</button>

</div>
</div>
</div>
